<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ME/CFS Outbreak Simulator — Integrated Systemics</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    (function(){
      const saved = localStorage.getItem('isrd-theme') || 'dark';
      document.documentElement.dataset.theme = saved;
      document.addEventListener('DOMContentLoaded', function(){
        const btn = document.getElementById('themeBtn');
        if (!btn) return;
        btn.textContent = saved === 'dark' ? 'Light mode' : 'Dark mode';
        btn.addEventListener('click', function(){
          const dark = document.documentElement.dataset.theme === 'dark';
          const next = dark ? 'light' : 'dark';
          document.documentElement.dataset.theme = next;
          btn.textContent = next === 'dark' ? 'Light mode' : 'Dark mode';
          localStorage.setItem('isrd-theme', next);
        });
      });
    })();
  </script>
  <style>
    .sim-page { display:flex; flex-direction:column; min-height:100vh; }
    .sim-topbar {
      display:flex; align-items:center; gap:16px; flex-wrap:wrap;
      padding:14px 24px; border-bottom:1px solid var(--line);
      background:var(--panel); backdrop-filter:blur(10px);
      position:sticky; top:0; z-index:10;
    }
    .sim-topbar .brand { font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      font-size:.82rem; color:var(--accent); }
    .sim-topbar a { color:var(--muted); font-size:.88rem; text-decoration:none; }
    .sim-topbar a:hover { color:var(--text); }
    .sim-topbar .sep { color:var(--line); }

    .sim-main {
      display:grid; grid-template-columns:1fr 320px;
      gap:0; flex:1; height:calc(100vh - 52px); overflow:hidden;
    }
    .sim-left { display:flex; flex-direction:column; border-right:1px solid var(--line); overflow:hidden; }
    .sim-canvas-area { flex:1; background:#060f16; position:relative; overflow:hidden; }
    #simCanvas { display:block; width:100%; height:100%; cursor:crosshair; }
    .sim-toolbar {
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      padding:10px 16px; background:var(--panel); border-top:1px solid var(--line);
    }
    .tb-btn { padding:7px 16px; border-radius:8px; border:1px solid var(--line);
      background:var(--panel-b); color:var(--text); font-size:.82rem; font-weight:600;
      cursor:pointer; transition:all .15s; }
    .tb-btn:hover, .tb-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .tb-sep { width:1px; height:20px; background:var(--line); margin:0 4px; }
    .speed-wrap { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:.8rem; }
    .speed-wrap input { width:80px; accent-color:var(--accent); }

    .sim-right { display:flex; flex-direction:column; overflow:hidden; }
    .panel-tabs { display:flex; border-bottom:1px solid var(--line); flex-shrink:0; }
    .panel-tab {
      flex:1; padding:10px 6px; text-align:center; font-size:.78rem; font-weight:600;
      color:var(--muted); cursor:pointer; border-bottom:2px solid transparent;
      transition:all .15s; letter-spacing:.04em; text-transform:uppercase;
    }
    .panel-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .panel-body { flex:1; overflow-y:auto; padding:16px;
      scrollbar-width:thin; scrollbar-color:var(--line) transparent; }

    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .stat-pill { display:flex; flex-direction:column; background:var(--panel-b);
      border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
    .stat-pill span:first-child { font-size:.7rem; color:var(--muted);
      text-transform:uppercase; letter-spacing:.06em; }
    .stat-pill span:last-child { font-size:1.15rem; font-weight:700; color:var(--accent2); margin-top:2px; }

    .legend { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
    .legend-row { display:flex; align-items:center; gap:8px; font-size:.82rem; color:var(--muted); }
    .legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

    .env-section h4 { margin:0 0 12px; font-size:.8rem; text-transform:uppercase;
      letter-spacing:.08em; color:var(--muted); }
    .env-row { margin-bottom:12px; }
    .env-row label { display:flex; justify-content:space-between; font-size:.82rem;
      color:var(--muted); margin-bottom:4px; }
    .env-row label span { color:var(--accent2); font-weight:600; }
    .env-row input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; }

    .detail-hint { color:var(--muted); font-size:.88rem; line-height:1.5; margin:0; }
    .detail-name { font-size:1.2rem; font-weight:700; margin-bottom:4px; }
    .detail-name.vp { color:#ffd850; }
    .detail-status { font-size:.88rem; font-weight:600; margin-bottom:10px; }
    .detail-narrative { font-size:.84rem; color:var(--muted); line-height:1.5;
      background:var(--panel-b); border:1px solid var(--line);
      border-radius:10px; padding:10px 12px; margin-bottom:12px; }
    .vp-narrative { border-color:rgba(255,216,80,0.3); background:rgba(255,216,80,0.04); }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
    .detail-grid > div { background:var(--panel-b); border:1px solid var(--line);
      border-radius:8px; padding:8px 10px; }
    .detail-label { display:block; font-size:.7rem; color:var(--muted);
      text-transform:uppercase; letter-spacing:.05em; margin-bottom:2px; }
    .detail-sub { font-size:.72rem; text-transform:uppercase; letter-spacing:.08em;
      color:var(--muted); margin-bottom:8px; margin-top:4px; }
    .factor-row { display:flex; align-items:center; gap:8px; font-size:.78rem;
      color:var(--muted); margin-bottom:6px; }
    .factor-row > span { flex:0 0 140px; }
    .factor-bar-wrap { flex:1; height:6px; background:var(--line); border-radius:3px; overflow:hidden; }
    .factor-bar { height:100%; border-radius:3px; transition:width .4s; }
    #brainstemCanvas { display:block; border-radius:8px; border:1px solid var(--line);
      background:#060f16; margin-top:4px; width:100%; height:auto; }

    .about-body { font-size:.85rem; color:var(--muted); line-height:1.65; }
    .about-body h3 { color:var(--text); font-size:.95rem; margin:16px 0 6px; }
    .about-body p  { margin:0 0 10px; }
    .about-body ul { padding-left:18px; margin:0 0 10px; }
    .about-body li { margin-bottom:4px; }
    .about-body .ref { font-size:.75rem; opacity:.7; }

    @media (max-width:800px) {
      .sim-main { grid-template-columns:1fr; height:auto; }
      .sim-left  { height:60vw; min-height:280px; }
    }
  </style>
</head>
<body>
<div class="sim-page">
  <header class="sim-topbar">
    <span class="brand" data-slot="brand-short">IS</span>
    <span class="sep">/</span>
    <a href="index.html" data-slot="brand">Integrated Systemics</a>
    <span class="sep">/</span>
    <span style="color:var(--text);font-size:.88rem" data-slot="breadcrumb">ME/CFS Outbreak Simulator</span>
    <div style="flex:1"></div>
    <button class="theme-toggle" id="themeBtn">Light mode</button>
  </header>

  <div class="sim-main">
    <!-- ── Left: canvas + toolbar ── -->
    <div class="sim-left">
      <div class="sim-canvas-area">
        <canvas id="simCanvas"></canvas>
      </div>
      <div class="sim-toolbar">
        <button class="tb-btn active" id="playBtn">▶ Play</button>
        <button class="tb-btn"        id="resetBtn">↺ Reset</button>
        <div class="tb-sep"></div>
        <div class="speed-wrap">
          Speed
          <input type="range" id="speedSlider" min="1" max="10" step="1" value="3" />
          <span id="speedVal">3×</span>
        </div>
        <div class="tb-sep"></div>
        <span id="toolbarHint" style="font-size:.78rem;color:var(--muted)">
          Click any person to inspect · Yellow ring = You
        </span>
      </div>
    </div>

    <!-- ── Right: tabbed panel ── -->
    <div class="sim-right">
      <div class="panel-tabs">
        <div class="panel-tab active" data-tab="stats">Population</div>
        <div class="panel-tab"        data-tab="detail">Profile</div>
        <div class="panel-tab"        data-tab="env">Environment</div>
        <div class="panel-tab"        data-tab="about">About</div>
      </div>

      <!-- Stats tab -->
      <div class="panel-body" id="tab-stats">
        <div class="stats-grid" id="statsGrid"></div>
        <div class="legend" id="legendEl">
          <div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px">Status key</div>
          <!-- populated by render-mecfs.js -->
        </div>
      </div>

      <!-- Detail tab -->
      <div class="panel-body" id="tab-detail" style="display:none">
        <div id="detailPanel">
          <p class="detail-hint">Click any person in the simulation to see their profile.</p>
        </div>
      </div>

      <!-- Environment tab -->
      <div class="panel-body" id="tab-env" style="display:none">
        <div id="envControls"><!-- populated by render-mecfs.js --></div>
      </div>

      <!-- About tab -->
      <div class="panel-body" id="tab-about" style="display:none">
        <div class="about-body" id="aboutBody"><!-- populated by render-mecfs.js --></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { loadSimContent, renderSimPage, getNarrative } from './js/render-mecfs.js';
  import { MECFSPopulationSim } from './sims/mecfs-population.js';

  // ── Load content JSON first ────────────────────────────────────
  const content = await loadSimContent();
  renderSimPage(content);

  // ── Canvas sizing ──────────────────────────────────────────────
  const canvas     = document.getElementById('simCanvas');
  const canvasWrap = canvas.parentElement;
  function resizeCanvas() {
    canvas.width  = canvasWrap.clientWidth;
    canvas.height = canvasWrap.clientHeight;
    if (sim) sim.resize(canvas.width, canvas.height);
  }

  // ── Init sim ───────────────────────────────────────────────────
  const detailEl = document.getElementById('detailPanel');
  const statsEl  = document.getElementById('statsGrid');
  let sim;

  function loop() {
    if (!sim) { requestAnimationFrame(loop); return; }
    if (sim.isRunning) sim.step();
    sim.draw();
    requestAnimationFrame(loop);
  }

  requestAnimationFrame(() => {
    resizeCanvas();
    sim = new MECFSPopulationSim(canvas, detailEl, statsEl, content);

    // Register canvas click AFTER sim (so sim's selection handler fires first)
    canvas.addEventListener('click', () => {
      if (sim.selected !== null) {
        tabs.forEach(t => t.classList.remove('active'));
        document.querySelector('[data-tab="detail"]').classList.add('active');
        document.querySelectorAll('.panel-body').forEach(b => b.style.display = 'none');
        document.getElementById('tab-detail').style.display = 'block';
      }
    });

    requestAnimationFrame(loop);
  });

  window.addEventListener('resize', resizeCanvas);

  // ── Play / pause ───────────────────────────────────────────────
  const playBtn = document.getElementById('playBtn');
  playBtn.addEventListener('click', () => {
    if (!sim) return;
    if (sim.isRunning) {
      sim.pause(); playBtn.textContent = '▶ Play'; playBtn.classList.remove('active');
    } else {
      sim.play();  playBtn.textContent = '⏸ Pause'; playBtn.classList.add('active');
    }
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!sim) return;
    sim.reset();
    playBtn.textContent = '▶ Play';
    playBtn.classList.remove('active');
  });

  // ── Speed ──────────────────────────────────────────────────────
  document.getElementById('speedSlider').addEventListener('input', e => {
    if (sim) sim.speed = +e.target.value;
    document.getElementById('speedVal').textContent = e.target.value + '×';
  });

  // ── Tabs ───────────────────────────────────────────────────────
  const tabs = document.querySelectorAll('.panel-tab');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.panel-body').forEach(b => b.style.display = 'none');
      document.getElementById('tab-' + tab.dataset.tab).style.display = 'block';
      if (tab.dataset.tab === 'detail' && sim) sim._updateDetail();
    });
  });

  // ── Environment sliders (built dynamically from JSON) ──────────
  document.getElementById('envControls').addEventListener('input', e => {
    const inp = e.target;
    if (!inp.dataset.env || !sim) return;
    sim.setEnv(inp.dataset.env, inp.value);
    const valEl = document.getElementById('v-' + inp.dataset.env);
    if (valEl) valEl.textContent = (+inp.value).toFixed(
      inp.step.includes('.') ? inp.step.split('.')[1].length : 0
    );
  });
</script>
</body>
</html>
